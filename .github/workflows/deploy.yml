# Syncs full source to nageshnnazare.github.io, then that repo builds & deploys the site.
name: Sync to GitHub Pages repo

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'eslint.config.js'
      - '.github/pages-site-deploy.yml'
      - 'SITE_README.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-pages
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare files for pages repo
        run: |
          cp .github/pages-site-deploy.yml .github/workflows/deploy.yml
          cp SITE_README.md README.md
          rm -f SITE_README.md

      - name: Sync source to nageshnnazare.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: nageshnnazare/nageshnnazare.github.io
          publish_branch: main
          publish_dir: .
          exclude_assets: ''
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'sync: source from nageshnnazare@${{ github.sha }}'
