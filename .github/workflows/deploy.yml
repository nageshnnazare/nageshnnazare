# Builds in nageshnnazare/nageshnnazare; publishes to https://nageshnnazare.github.io
# Requires GH_PAGES_TOKEN (see README or repo secrets).
name: Trigger portfolio deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy on nageshnnazare.github.io
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAGES_TOKEN }}
          repository: nageshnnazare/nageshnnazare.github.io
          event-type: deploy
